<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完全自動AIモード搭載オンラインクイズ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        h1 { font-size: 1.5rem; color: #2c3e50; margin-top: 0; }
        
        .leave-btn { position: absolute; top: 20px; right: 20px; padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .leave-btn:hover { background: #c0392b; }

        .status { font-size: 1.2rem; font-weight: bold; margin: 15px 0; padding: 15px; border-radius: 8px; }
        .status.ready { background: #fff3e0; color: #e65100; }
        .status.wait { background: #e3f2fd; color: #0d47a1; }
        .status.answering { background: #ffebee; color: #c62828; }
        .status.correct-banner { background: #e8f5e9; color: #2e7d32; border: 2px solid #4caf50; font-size: 1.4rem; padding: 20px; }
        .status.wrong-banner { background: #ffebee; color: #c62828; border: 2px solid #ef5350; font-size: 1.4rem; padding: 20px; }
        
        .timer-box { font-size: 2rem; font-weight: bold; color: #e74c3c; margin: 10px 0; display: none; }
        .quiz-display { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; font-size: 1.3rem; font-weight: bold; min-height: 50px; margin: 15px 0; display: flex; align-items: center; justify-content: center; text-align: left; white-space: pre-wrap; }
        
        .push-btn {
            width: 180px; height: 180px; border-radius: 50%; border: none;
            background: #e74c3c; color: white; font-size: 1.6rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px #c0392b; transition: all 0.1s; margin: 20px 0;
        }
        .push-btn:active { transform: translateY(4px); box-shadow: 0 4px #c0392b; }
        .push-btn:disabled { background: #bdc3c7; box-shadow: 0 8px #95a5a6; cursor: not-allowed; transform: none; }

        .scoreboard { background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 15px 0; text-align: left; }
        .scoreboard h4 { margin: 0 0 8px 0; color: #4a5568; font-size: 0.95rem; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
        .score-grid { display: block; max-height: 150px; overflow-y: auto; font-size: 0.85rem; }
        .score-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #e2e8f0; }

        .panel { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        .panel h3 { margin-top: 0; font-size: 1rem; color: #666; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-row { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .checkbox-row { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: bold; color: #2c3e50; }
        input, select, textarea { padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        input[type="checkbox"] { flex: none; width: 20px; height: 20px; }
        
        .btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; border: none; border-radius: 6px; color: white; font-weight: bold; }
        .btn-start { background: #3498db; width: 100%; margin-top: 10px; }
        .btn-ai { background: #9b59b6; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-reset { background: #95a5a6; }
        .btn-submit { background: #e67e22; }
        .btn-correct { background: #2ecc71; flex: 1; padding: 15px; font-size: 1.2rem; }
        .btn-wrong { background: #e74c3c; flex: 1; padding: 15px; font-size: 1.2rem; }
        .judge-box { display: flex; gap: 10px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <button id="leave-room-btn" class="leave-btn hidden">🚪 退室</button>
    <h1 id="title-text">🔥 オンラインクイズシステム</h1>
    
    <div class="panel" id="room-setup-panel">
        <h3>🔒 部屋の設定（共通キーワード）</h3>
        <div class="input-row"><label>部屋名 (ルームID):</label><input type="text" id="room-id" value="room1"></div>
        <div class="input-row"><label>部屋のパスワード:</label><input type="text" id="room-pass" value="1234"></div>
        <div class="input-row"><label>あなたの名前:</label><input type="text" id="username" value="プレイヤー1"></div>
        <div class="checkbox-row">
            <input type="checkbox" id="is-host-check">
            <label for="is-host-check">👑 ホストとして部屋を作成、または入る</label>
        </div>
        <button class="btn btn-start" id="connect-btn">この部屋に入る</button>
    </div>

    <div id="game-area" class="hidden">
        <div class="quiz-display" id="quiz-text">ホストが出題するのをお待ちください...</div>
        <div id="timer-box" class="timer-box">⏱️ 残り <span id="timer-count">10</span> 秒</div>
        <div id="status-box" class="status ready">待機中...</div>

        <div class="scoreboard">
            <h4>📊 スコアボード (総合ポイント / 正解 / 間違い)</h4>
            <div id="score-rows" class="score-grid"></div>
        </div>

        <div id="play-interactive-area">
            <button id="buzzer" class="push-btn" disabled>PUSH!!</button>

            <div class="panel hidden" id="answer-panel">
                <h3>✍️ あなたに解答権があります！10秒以内に答えを入力してください</h3>
                <div class="input-row">
                    <input type="text" id="text-answer" placeholder="ここに答えを記述">
                    <button class="btn btn-submit" id="submit-answer-btn">送信</button>
                </div>
            </div>
        </div>

        <div id="host-view" class="hidden" style="margin-top: 30px;">
            <div class="panel hidden" id="host-judge-panel" style="border: 3px solid #e67e22; background: #fff5e6;">
                <h3 style="color:#d35400; font-weight: bold;">⚖️ ホスト専用：手動回答の採点</h3>
                <div style="font-size: 1.1rem; margin-bottom: 10px;">
                    解答者: <span id="judge-player-name" style="font-weight: bold; color: #2c3e50;">-</span><br>
                    回答内容: <span id="judge-player-answer" style="font-size: 1.3rem; font-weight: bold; color: #c0392b;">-</span>
                </div>
                <div class="judge-box">
                    <button class="btn btn-correct" id="host-correct-btn">⭕ 正解判定にする</button>
                    <button class="btn btn-wrong" id="host-wrong-btn">❌ 不正解判定にする</button>
                </div>
            </div>

            <div class="panel" style="border: 2px solid #9b59b6; background: #f5eef8;">
                <h3 style="color:#8e44ad;">🤖 AIおまかせ自動出題モード</h3>
                <button class="btn btn-ai" id="ai-start-btn">✨ AIに問題を選んでもらう（完全自動ループ）</button>
            </div>

            <div class="panel" style="border: 2px dashed #3498db; background: #ecf0f1;">
                <h3 style="color:#2980b9;">👤 通常の手動出題</h3>
                <div class="input-row">
                    <label>問題文入力:</label>
                    <textarea id="custom-quiz-text" rows="2" placeholder="手動で問題文を入力できます"></textarea>
                </div>
                <div class="input-row">
                    <label>想定する正解（任意）:</label>
                    <input type="text" id="custom-quiz-answer" placeholder="全員不正解時の正解表示用（例：織田信長）">
                </div>
                <button class="btn btn-start" id="start-btn">📢 この問題を出題（ボタン有効化）</button>
            </div>
            
            <button class="btn btn-reset" id="reset-btn" style="width:100%;">🔄 強制終了してリセット</button>
        </div>
    </div>
</div>

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'start') {
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.setValueAtTime(659.25, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'buzzer') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'correct') {
            osc.frequency.setValueAtTime(659.25, now);
            osc.frequency.setValueAtTime(783.99, now + 0.15);
            osc.frequency.setValueAtTime(1046.50, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        } else if (type === 'wrong') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(261.63, now);
            osc.frequency.setValueAtTime(196.00, now + 0.2);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    // 部屋に入る処理
    document.getElementById("connect-btn").addEventListener("click", async () => {
        const roomId = document.getElementById("room-id").value.trim();
        const roomPass = document.getElementById("room-pass").value.trim();
        myName = document.getElementById("username").value.trim();
        const hostRequested = document.getElementById("is-host-check").checked;

        if(!roomId || !myName) {
            alert("部屋名とあなたの名前を入力してください");
            return;
        }

        roomRef = doc(db, "quiz_rooms", roomId);
        const snap = await getDoc(roomRef);

        if(snap.exists()) {
            const data = snap.data();
            const savedPass = (data.password !== undefined && data.password !== null) ? data.password.toString().trim() : "";
            
            // 🔒 合言葉の認証チェック
            if(savedPass !== roomPass) {
                alert("部屋のパスワードが違います");
                return;
            }
            
            isHost = hostRequested;
            let currentUsers = data.activeUsers || [];
            if(!currentUsers.includes(myName)) {
                currentUsers.push(myName);
                await updateDoc(roomRef, { activeUsers: currentUsers });
            }
        } else {
            // 新規作成時
            isHost = hostRequested;
            await setDoc(roomRef, {
                password: roomPass,
                state: "ready",
                mode: "manual",
                quizText: "ホストが出題するのをお待ちください...",
                timeLeft: 10,
                answeredBy: "",
                currentAnswer: "",
                activeUsers: [myName],
                excludedPlayers: [],
                scores: {},
                currentAnswersList: [],
                manualCorrectAnswer: ""
            });
        }

        document.getElementById("room-setup-panel").classList.add("hidden");
        document.getElementById("game-area").classList.remove("hidden");
        document.getElementById("leave-room-btn").classList.remove("hidden");
        
        if(isHost) {
            document.getElementById("host-view").classList.remove("hidden");
        } else {
            document.getElementById("host-view").classList.add("hidden");
        }
        document.getElementById("title-text").innerText = `部屋: ${roomId} (${isHost ? '👑ホスト' : '👤プレイヤー'}: ${myName})`;

        startRoomListener();
    });

    // 退室ボタンの処理
    document.getElementById("leave-room-btn").addEventListener("click", async () => {
        if (roomRef) {
            try {
                const snap = await getDoc(roomRef);
                if (snap.exists()) {
                    let currentUsers = snap.data().activeUsers || [];
                    currentUsers = currentUsers.filter(u => u !== myName);
                    await updateDoc(roomRef, { activeUsers: currentUsers });
                }
            } catch (e) { console.error(e); }
        }
        if (unsubscribeRoom) { unsubscribeRoom(); unsubscribeRoom = null; }
        if (timerId) { clearInterval(timerId); timerId = null; }
        isHost = false;
        document.getElementById("room-setup-panel").classList.remove("hidden");
        document.getElementById("game-area").classList.add("hidden");
        document.getElementById("leave-room-btn").classList.add("hidden");
        document.getElementById("host-view").classList.add("hidden");
        document.getElementById("title-text").innerText = "🔥 オンラインクイズシステム";
    });

    function startRoomListener() {
        unsubscribeRoom = onSnapshot(roomRef, async (snapshot) => {
            if (!snapshot.exists()) return;
            const data = snapshot.data();
            const activeUsers = data.activeUsers || [];
            const excluded = data.excludedPlayers || [];

            document.getElementById("quiz-text").innerText = data.quizText;
            document.getElementById("timer-count").innerText = data.timeLeft;
            
            const statusBox = document.getElementById("status-box");
            statusBox.className = "status " + data.state;
            
            const buzzerBtn = document.getElementById("buzzer");
            const answerPanel = document.getElementById("answer-panel");
            const timerBox = document.getElementById("timer-box");
            const hostJudgePanel = document.getElementById("host-judge-panel");

            // ⏱️ タイマーおよび画面制御
            if (data.state === "answering") {
                timerBox.style.display = "block";
                buzzerBtn.disabled = true;
                
                if (data.answeredBy === myName) {
                    answerPanel.classList.remove("hidden");
                } else {
                    answerPanel.classList.add("hidden");
                }

                // 手動モードで回答がテキスト送信されたら、ホスト側に判定パネルを出す
                if (isHost && data.mode === "manual" && data.currentAnswer) {
                    hostJudgePanel.classList.remove("hidden");
                    document.getElementById("judge-player-name").innerText = data.answeredBy;
                    document.getElementById("judge-player-answer").innerText = data.currentAnswer;
                } else {
                    hostJudgePanel.classList.add("hidden");
                }

                // カウントダウン処理（ホストが代表して管理）
                if (isHost && !timerId) {
                    let currentSec = data.timeLeft;
                    timerId = setInterval(async () => {
                        currentSec--;
                        if (currentSec <= 0) {
                            clearInterval(timerId);
                            timerId = null;
                            await handleTimeout(data);
                        } else {
                            await updateDoc(roomRef, { timeLeft: currentSec });
                        }
                    }, 1000);
                }
            } else if (data.state === "wait" || data.state === "ready") {
                if (timerId) { clearInterval(timerId); timerId = null; }
                timerBox.style.display = "none";
                answerPanel.classList.add("hidden");
                hostJudgePanel.classList.add("hidden");

                if (data.state === "ready") {
                    statusBox.innerText = "出題待機中...";
                    buzzerBtn.disabled = true;
                } else {
                    statusBox.innerText = "問題進行中！早押しボタンを押せます！";
                    
                    // モードごとのホストの早押し権限
                    if (isHost && data.mode === "manual") {
                        buzzerBtn.disabled = true; // 手動モードのホストは回答不可
                    } else if (excluded.includes(myName)) {
                        statusBox.innerText = "あなたは回答済み、またはお休み中（他の人の再押し待機）";
                        buzzerBtn.disabled = true;
                    } else {
                        buzzerBtn.disabled = false; // AIモードのホスト、および未解答のプレイヤーは押せる
                    }
                }
            }

            if (data.state === "result_correct") {
                if (timerId) { clearInterval(timerId); timerId = null; }
                statusBox.className = "status correct-banner";
                statusBox.innerText = `⭕ 正解!! 【${data.answeredBy} さん】が正解しました！ (+1pt)`;
                answerPanel.classList.add("hidden");
                hostJudgePanel.classList.add("hidden");
            } else if (data.state === "result_wrong") {
                if (timerId) { clearInterval(timerId); timerId = null; }
                statusBox.className = "status wrong-banner";
                const displayAns = data.currentAnswer ? data.currentAnswer : "（未入力）";
                statusBox.innerText = `❌ 不正解... 【${data.answeredBy} さん】の回答 ➔ 「${displayAns}」 (-1pt)`;
                answerPanel.classList.add("hidden");
                hostJudgePanel.classList.add("hidden");
            } else if (data.state === "result_all_wrong") {
                if (timerId) { clearInterval(timerId); timerId = null; }
                statusBox.className = "status wrong-banner";
                const rightAns = data.mode === "ai" ? (data.currentAnswersList ? data.currentAnswersList[0] : "-") : (data.manualCorrectAnswer || "未設定");
                statusBox.innerText = `🚨 全員不正解（またはタイムアップ）終了！\n【正解： ${rightAns} 】`;
                answerPanel.classList.add("hidden");
                hostJudgePanel.classList.add("hidden");
            }

            // スコアボード描画
            const scoreRowsDiv = document.getElementById("score-rows");
            scoreRowsDiv.innerHTML = "";
            const scores = data.scores || {};
            for (const player in scores) {
                if (!activeUsers.includes(player)) continue;
                const row = document.createElement("div");
                row.className = "score-row";
                const pt = scores[player].pt !== undefined ? scores[player].pt : 0;
                const correct = scores[player].correct || 0;
                const wrong = scores[player].wrong || 0;
                row.innerHTML = `<span><b>${player}</b> ${activeUsers[0]===player?'👑':''}</span><span>🪙 ${pt} pt (⭕ ${correct} / ❌ ${wrong})</span>`;
                scoreRowsDiv.appendChild(row);
            }
        });
    }

    // ⏱️ 10秒制限時間切れ（タイムアップ）時の処理
    async function handleTimeout(data) {
        if (!roomRef) return;
        playSound('wrong');
        const player = data.answeredBy;
        
        let currentScores = data.scores || {};
        if (player) {
            if (!currentScores[player]) currentScores[player] = { pt: 0, correct: 0, wrong: 0 };
            currentScores[player].pt = (currentScores[player].pt || 0) - 1;
            currentScores[player].wrong = (currentScores[player].wrong || 0) + 1;
        }
        
        const currentExcluded = data.excludedPlayers || [];
        if (player && !currentExcluded.includes(player)) {
            currentExcluded.push(player);
        }

        // 部屋に参加している全員（手動モードの場合はホストを除く参加者）
        const activeUsers = data.activeUsers || [];
        const targetsForQuiz = data.mode === "manual" ? activeUsers.filter(u => u !== activeUsers[0]) : activeUsers;
        const isAllExcluded = targetsForQuiz.every(u => currentExcluded.includes(u));

        if (isAllExcluded || targetsForQuiz.length === 0) {
            // 全員がタイムアップ、または間違えた場合 ➔ 正解を出して次へ
            await updateDoc(roomRef, {
                state: "result_all_wrong",
                currentAnswer: "（タイムアップ）",
                scores: currentScores,
                excludedPlayers: currentExcluded
            });
            setTimeout(async () => {
                if (data.mode === "ai") {
                    await triggerNextAiQuestion();
                } else {
                    await updateDoc(roomRef, { state: "ready", quizText: "ホストの次の出題をお待ちください..." });
                }
            }, 4000);
        } else {
            // まだ解答していない人がいる場合 ➔ wait状態に戻し、他の人が再押し可能にする
            await updateDoc(roomRef, {
                state: "wait",
                answeredBy: "",
                currentAnswer: "",
                timeLeft: 10,
                scores: currentScores,
                excludedPlayers: currentExcluded
            });
        }
    }

    // 🤖 AIのランダム次の問題セット
    async function triggerNextAiQuestion(customPrefix = "") {
        if(!roomRef || aiQuizDatabase.length === 0) return;
        const randomQuiz = aiQuizDatabase[Math.floor(Math.random() * aiQuizDatabase.length)];
        const displayText = customPrefix ? `${customPrefix}\n\n【🤖 AI問題】${randomQuiz.q}` : `【🤖 AI問題】${randomQuiz.q}`;
        
        await updateDoc(roomRef, {
            state: "wait", mode: "ai", answeredBy: "", quizText: displayText,
            currentAnswer: "", timeLeft: 10, excludedPlayers: [], currentAnswersList: randomQuiz.a
        });
        playSound('start');
    }

    // 早押しボタン
    document.getElementById("buzzer").addEventListener("click", async () => {
        playSound('buzzer');
        await updateDoc(roomRef, { state: "answering", answeredBy: myName, currentAnswer: "", timeLeft: 10 });
    });

    // 解答記述・送信ボタン
    document.getElementById("submit-answer-btn").addEventListener("click", async () => {
        const ans = document.getElementById("text-answer").value.trim();
        if(!ans) return;
        
        document.getElementById("text-answer").value = "";
        
        const snap = await getDoc(roomRef);
        const data = snap.data();

        if (data.mode === "ai") {
            // AIモード：自動で答え合わせ判定
            const isCorrect = data.currentAnswersList.some(correctAns => ans.toLowerCase().includes(correctAns.toLowerCase()));
            let currentScores = data.scores || {};
            const player = data.answeredBy;
            if (!currentScores[player]) currentScores[player] = { pt: 0, correct: 0, wrong: 0 };

            if (isCorrect) {
                playSound('correct');
                currentScores[player].pt = (currentScores[player].pt || 0) + 1;
                currentScores[player].correct = (currentScores[player].correct || 0) + 1;
                await updateDoc(roomRef, { state: "result_correct", scores: currentScores, currentAnswer: ans });
                setTimeout(async () => { await triggerNextAiQuestion(); }, 4000);
            } else {
                playSound('wrong');
                currentScores[player].pt = (currentScores[player].pt || 0) - 1;
                currentScores[player].wrong = (currentScores[player].wrong || 0) + 1;
                
                const currentExcluded = data.excludedPlayers || [];
                if (!currentExcluded.includes(player)) currentExcluded.push(player);
                
                const activeUsers = data.activeUsers || [];
                const isAllExcluded = activeUsers.every(u => currentExcluded.includes(u));
                
                if (isAllExcluded) {
                    await updateDoc(roomRef, { state: "result_all_wrong", scores: currentScores, excludedPlayers: currentExcluded, currentAnswer: ans });
                    setTimeout(async () => { await triggerNextAiQuestion(); }, 4000);
                } else {
                    await updateDoc(roomRef, { state: "wait", answeredBy: "", currentAnswer: "", timeLeft: 10, scores: currentScores, excludedPlayers: currentExcluded });
                }
            }
        } else {
            // 手動モード：一旦データベースに文字列を送り、ホストの採点ボタン待ちにする
            await updateDoc(roomRef, { currentAnswer: ans });
        }
    });

    // 👑 ホスト専用：手動モード「⭕ 正解」ボタン処理
    document.getElementById("host-correct-btn").addEventListener("click", async () => {
        const snap = await getDoc(roomRef);
        const data = snapshotDataFix(snap.data());
        const player = data.answeredBy;
        if(!player) return;

        playSound('correct');
        let currentScores = data.scores || {};
        if (!currentScores[player]) currentScores[player] = { pt: 0, correct: 0, wrong: 0 };
        currentScores[player].pt = (currentScores[player].pt || 0) + 1;
        currentScores[player].correct = (currentScores[player].correct || 0) + 1;

        await updateDoc(roomRef, { state: "result_correct", scores: currentScores });
        setTimeout(async () => {
            await updateDoc(roomRef, { state: "ready", quizText: "ホストの次の出題をお待ちください..." });
        }, 4000);
    });

    // 👑 ホスト専用：手動モード「❌ 不正解」ボタン処理
    document.getElementById("host-wrong-btn").addEventListener("click", async () => {
        const snap = await getDoc(roomRef);
        const data = snapshotDataFix(snap.data());
        const player = data.answeredBy;
        if(!player) return;

        playSound('wrong');
        let currentScores = data.scores || {};
        if (!currentScores[player]) currentScores[player] = { pt: 0, correct: 0, wrong: 0 };
        currentScores[player].pt = (currentScores[player].pt || 0) - 1;
        currentScores[player].wrong = (currentScores[player].wrong || 0) + 1;

        const currentExcluded = data.excludedPlayers || [];
        if (!currentExcluded.includes(player)) currentExcluded.push(player);

        const activeUsers = data.activeUsers || [];
        // ホスト（activeUsers[0]）を除いたプレイヤー全員が間違えたか確認
        const targetsForQuiz = activeUsers.filter(u => u !== activeUsers[0]);
        const isAllExcluded = targetsForQuiz.every(u => currentExcluded.includes(u));

        if (isAllExcluded || targetsForQuiz.length === 0) {
            await updateDoc(roomRef, { state: "result_all_wrong", scores: currentScores, excludedPlayers: currentExcluded });
            setTimeout(async () => {
                await updateDoc(roomRef, { state: "ready", quizText: "ホストの次の出題をお待ちください..." });
            }, 4000);
        } else {
            // 他の人が再押しできる状態へ戻す
            await updateDoc(roomRef, { state: "wait", answeredBy: "", currentAnswer: "", timeLeft: 10, scores: currentScores, excludedPlayers: currentExcluded });
        }
    });

    function snapshotDataFix(data) {
        if(data && data.scores) {
            for(let p in data.scores) {
                if(data.scores[p].points !== undefined && data.scores[p].pt === undefined) {
                    data.scores[p].pt = data.scores[p].points;
                }
            }
        }
        return data;
    }

    // 👑 ホスト専用：通常の手動出題ボタン
    document.getElementById("start-btn").addEventListener("click", async () => {
        const qText = document.getElementById("custom-quiz-text").value.trim();
        const rightAns = document.getElementById("custom-quiz-answer").value.trim();
        if(!qText) {
            alert("問題文を入力してください");
            return;
        }
        await updateDoc(roomRef, {
            state: "wait", mode: "manual", answeredBy: "", quizText: `【👤 手動問題】\n${qText}`,
            currentAnswer: "", timeLeft: 10, excludedPlayers: [], manualCorrectAnswer: rightAns
        });
        document.getElementById("custom-quiz-text").value = "";
        playSound('start');
    });

    // 👑 ホスト専用：AI自動出題開始ボタン
    document.getElementById("ai-start-btn").addEventListener("click", async () => {
        await triggerNextAiQuestion("✨ AI自動出題モードを開始します！");
    });

    // 強制リセット
    document.getElementById("reset-btn").addEventListener("click", async () => {
        if(!roomRef) return;
        await updateDoc(roomRef, {
            state: "ready", answeredBy: "", quizText: "ホストが出題するのをお待ちください...",
            timeLeft: 10, currentAnswer: "", excludedPlayers: [], currentAnswersList: [], manualCorrectAnswer: ""
        });
    });
</script>
